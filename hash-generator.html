<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator (MD5, SHA-256, SHA-512) - Free Online | DevToolBox</title>
<meta name="description" content="Generate MD5, SHA-1, SHA-256, SHA-512 hashes from text. Free online hash generator with instant results. No signup.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:1.5rem 1rem}
nav a{color:#00d4ff;text-decoration:none;font-size:0.9rem}
h1{font-size:1.8rem;margin:1rem 0 0.5rem;color:#fff}
.desc{color:#888;margin-bottom:1.5rem}
textarea{width:100%;height:120px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;color:#e0e0e0;font-family:monospace;font-size:13px;padding:1rem;resize:vertical;margin-bottom:1rem}
textarea:focus{outline:none;border-color:#00d4ff}
button{background:#1a1a2e;color:#00d4ff;border:1px solid #2a2a4a;padding:0.6rem 1.2rem;border-radius:6px;cursor:pointer;font-size:0.9rem;margin-bottom:1rem}
button:hover{background:#2a2a4a;border-color:#00d4ff}
.hash-row{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;padding:1rem;margin-bottom:0.5rem;display:flex;justify-content:space-between;align-items:center;gap:1rem}
.hash-row .label{font-weight:bold;min-width:80px;color:#00d4ff}
.hash-row .value{font-family:monospace;font-size:12px;word-break:break-all;flex:1;color:#ccc}
.hash-row button{margin:0;padding:0.3rem 0.6rem;font-size:0.8rem}
footer{text-align:center;margin-top:3rem;color:#555;font-size:0.85rem}
footer a{color:#00d4ff;text-decoration:none}
</style>
</head>
<body>
<div class="container">
<nav><a href="/">← DevToolBox</a></nav>
<h1>🔐 Hash Generator</h1>
<p class="desc">Generate cryptographic hashes from any text. All computation happens in your browser.</p>
<textarea id="input" placeholder="Enter text to hash..."></textarea>
<button onclick="generateHashes()">⚡ Generate All Hashes</button>
<div id="results"></div>
<footer><p>☕ Tip: <code style="color:#00d4ff">0x6d15eE39fB46Eb439d7B19ACEd5d36A4A327eAa2</code> (ETH/Base) | <a href="/">DevToolBox</a></p></footer>
</div>
<script>
async function hash(algo,text){
const enc=new TextEncoder().encode(text);
const buf=await crypto.subtle.digest(algo,enc);
return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function generateHashes(){
const text=document.getElementById('input').value;
if(!text){document.getElementById('results').innerHTML='<p style="color:#ff4444">Enter text first</p>';return}
const algos=[['SHA-1','SHA-1'],['SHA-256','SHA-256'],['SHA-384','SHA-384'],['SHA-512','SHA-512']];
let html='';
for(const[name,algo]of algos){
const h=await hash(algo,text);
html+=`<div class="hash-row"><span class="label">${name}</span><span class="value" id="v-${name}">${h}</span><button onclick="navigator.clipboard.writeText(document.getElementById('v-${name}').textContent)">📋</button></div>`;
}
document.getElementById('results').innerHTML=html;
}
</script>
</body>
</html>
